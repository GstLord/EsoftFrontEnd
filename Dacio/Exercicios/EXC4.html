<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinity Bank</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f2f2f2;
    }

    .container{
      width: 420px;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1{
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    .campo{
      margin-bottom: 18px;
    }

    label{
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #444;
    }

    input, select{
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    button{
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover{
      background: #0056b3;
    }

    #resultado{
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      background: #f7f7f7;
      line-height: 1.8;
      font-size: 17px;
    }

  </style>

</head>

<body>

  <div class="container">

    <h1>Infinity Bank</h1>

    <div class="campo">
      <label for="bandeira">Bandeira</label>

      <select id="bandeira">
        <option value="visa">Visa</option>
        <option value="master">Master</option>
        <option value="elo">Elo</option>
      </select>
    </div>

    <div class="campo">
      <label for="valor">Valor da Venda</label>

      <input 
        type="number" 
        id="valor"
        step="0.01"
        placeholder="Digite o valor"
      >
    </div>

    <div class="campo">
      <label for="parcelas">Quantidade de Parcelas</label>

      <input 
        type="number" 
        id="parcelas"
        min="1"
        placeholder="Digite as parcelas"
      >
    </div>

    <button id="calcular">
      Simular Venda
    </button>

    <div id="resultado"></div>

  </div>

  <script>

    const botao = document.getElementById("calcular");

    botao.addEventListener("click", () => {

      const bandeira = document.getElementById("bandeira").value;
      const valor = Number(document.getElementById("valor").value);
      const parcelas = Number(document.getElementById("parcelas").value);

      const resultado = document.getElementById("resultado");

      let taxaBandeira = 0;

      switch(bandeira){

        case "visa":
          taxaBandeira = valor * 0.02;
        break;

        case "master":
          taxaBandeira = valor * 0.0185;
        break;

        case "elo":
          taxaBandeira = valor * 0.03;
        break;

      }

      let juros = valor * (0.0035 * parcelas);

      let taxaMensal = 12.50 * parcelas;

      let valorTotal = valor + taxaBandeira + juros + taxaMensal;

      let valorParcela = valorTotal / parcelas;

      resultado.innerHTML = `
        <strong>Resumo da Venda</strong><br><br>

        Valor da Venda: R$ ${valor.toFixed(2)} <br>

        Taxa da Bandeira: R$ ${taxaBandeira.toFixed(2)} <br>

        Juros Totais: R$ ${juros.toFixed(2)} <br>

        Taxa Mensal: R$ ${taxaMensal.toFixed(2)} <br>

        Valor Total: R$ ${valorTotal.toFixed(2)} <br>

        Valor de cada Parcela: R$ ${valorParcela.toFixed(2)}
      `;

    });

  </script>

</body>
</html>
