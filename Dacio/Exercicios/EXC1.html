<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Validador de CPF</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f2f5;
    }

    .container{
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
    }

    h1{
      margin-bottom: 20px;
      color: #333;
    }

    input{
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    button{
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover{
      background: #0056b3;
    }

    #resultado{
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .valido{
      color: green;
    }

    .invalido{
      color: red;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Validador de CPF</h1>

    <input type="text" id="cpf" placeholder="Digite o CPF">

    <button onclick="validarCPF()">
      Validar
    </button>

    <p id="resultado"></p>
  </div>

  <script>

    function validarCPF(){

      let cpf = document.getElementById("cpf").value;

      cpf = cpf.replace(/\D/g, "");

      const resultado = document.getElementById("resultado");

      if(cpf.length !== 11){
        resultado.innerHTML = "CPF Inválido";
        resultado.className = "invalido";
        return;
      }

      if(/^(\d)\1+$/.test(cpf)){
        resultado.innerHTML = "CPF Inválido";
        resultado.className = "invalido";
        return;
      }

      let soma = 0;
      let resto;

      for(let i = 0; i < 9; i++){
        soma += parseInt(cpf.charAt(i)) * (10 - i);
      }

      resto = (soma * 10) % 11;

      if(resto === 10){
        resto = 0;
      }

      if(resto !== parseInt(cpf.charAt(9))){
        resultado.innerHTML = "CPF Inválido";
        resultado.className = "invalido";
        return;
      }

      soma = 0;

      for(let i = 0; i < 10; i++){
        soma += parseInt(cpf.charAt(i)) * (11 - i);
      }

      resto = (soma * 10) % 11;

      if(resto === 10){
        resto = 0;
      }

      if(resto !== parseInt(cpf.charAt(10))){
        resultado.innerHTML = "CPF Inválido";
        resultado.className = "invalido";
        return;
      }

      resultado.innerHTML = "CPF Válido";
      resultado.className = "valido";
    }

  </script>

</body>
</html>
