<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Média</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f2f2f2;
    }

    .container{
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 400px;
    }

    h1{
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    .campo{
      margin-bottom: 15px;
    }

    label{
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #444;
    }

    input{
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    button{
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    button:hover{
      background: #0056b3;
    }

    #resultado{
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }

    .aprovado{
      color: blue;
    }

    .exame{
      color: green;
    }

    .reprovado{
      color: red;
    }

  </style>

</head>

<body>

  <div class="container">

    <h1>Calculadora de Média</h1>

    <div class="campo">
      <label for="nome">Nome do Aluno</label>
      <input type="text" id="nome" placeholder="Digite o nome">
    </div>

    <div class="campo">
      <label for="nota1">Nota 1</label>
      <input type="number" id="nota1" step="0.1">
    </div>

    <div class="campo">
      <label for="nota2">Nota 2</label>
      <input type="number" id="nota2" step="0.1">
    </div>

    <div class="campo">
      <label for="nota3">Nota 3</label>
      <input type="number" id="nota3" step="0.1">
    </div>

    <button id="calcular">
      Calcular Média
    </button>

    <div id="resultado"></div>

  </div>

  <script>

    const botao = document.getElementById("calcular");

    botao.addEventListener("click", () => {

      const nome = document.getElementById("nome").value;

      const nota1 = Number(document.getElementById("nota1").value);
      const nota2 = Number(document.getElementById("nota2").value);
      const nota3 = Number(document.getElementById("nota3").value);

      const resultado = document.getElementById("resultado");

      const media = (nota1 + nota2 + nota3) / 3;

      if(media >= 7){

        resultado.innerHTML = `
          ${nome} foi APROVADO! <br>
          Média: ${media.toFixed(2)}
        `;

        resultado.className = "aprovado";

      }

      else if(media >= 4){

        let falta = 10 - media;

        resultado.innerHTML = `
          ${nome} está em EXAME! <br>
          Média: ${media.toFixed(2)} <br>
          Faltam ${falta.toFixed(2)} pontos para chegar em 10.
        `;

        resultado.className = "exame";

      }

      else{

        resultado.innerHTML = `
          ${nome} foi REPROVADO! <br>
          Média: ${media.toFixed(2)}
        `;

        resultado.className = "reprovado";

      }

    });

  </script>

</body>
</html>
