<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Eventos</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f2f2f2;
    }

    .card{
      width: 420px;
      background: white;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    h1{
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    .campo{
      margin-bottom: 18px;
    }

    label{
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #444;
    }

    select,
    input{
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    button{
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover{
      background: #0056b3;
    }

    #resultado{
      margin-top: 25px;
      background: #f8f8f8;
      padding: 18px;
      border-radius: 10px;
      line-height: 1.9;
      font-size: 17px;
      color: #333;
    }

  </style>

</head>

<body>

  <div class="card">

    <h1>Orçamento de Evento</h1>

    <div class="campo">

      <label for="pacote">Escolha o Pacote</label>

      <select id="pacote">

        <option value="50">Standard - R$ 50</option>

        <option value="80">Premium - R$ 80</option>

        <option value="120">Infinity Deluxe - R$ 120</option>

      </select>

    </div>

    <div class="campo">

      <label for="pessoas">Quantidade de Pessoas</label>

      <input 
        type="number"
        id="pessoas"
        placeholder="Digite a quantidade"
        min="1"
      >

    </div>

    <button id="calcular">
      Calcular Orçamento
    </button>

    <div id="resultado"></div>

  </div>

  <script>

    const botao = document.getElementById("calcular");

    botao.addEventListener("click", () => {

      const valorPacote = Number(document.getElementById("pacote").value);

      const pessoas = Number(document.getElementById("pessoas").value);

      const resultado = document.getElementById("resultado");

      let custoBruto = valorPacote * pessoas;

      let taxaServico = custoBruto * 0.10;

      let subtotal = custoBruto + taxaServico;

      let desconto = 0;

      if(pessoas > 100){

        desconto = subtotal * 0.05;

      }

      let totalFinal = subtotal - desconto;

      resultado.innerHTML = `

        <strong>Resumo do Evento</strong><br><br>

        Custo Bruto: R$ ${custoBruto.toFixed(2)} <br>

        Taxa de Serviço (10%): R$ ${taxaServico.toFixed(2)} <br>

        Desconto Aplicado: R$ ${desconto.toFixed(2)} <br>

        Total Final: R$ ${totalFinal.toFixed(2)}

      `;

    });

  </script>

</body>
</html>
